# This GitHub Actions workflow creates, starts, stops, and deletes an ARK: Survival Evolved server stack.
# Discord notifications are sent by AWS Lambda resources inside the stack, not by GitHub Actions.

name: ArkSE Stack Control

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What do you want to do?"
        required: true
        type: choice
        options:
          - create
          - start
          - stop
          - delete
      stack_name:
        description: "CloudFormation stack name"
        required: true
        type: string
      stack_config_profile:
        description: "Configuration profile from ArkSE_server/server-config.json"
        required: false
        default: "default"
        type: string
      template_path:
        description: "Template path for create action"
        required: false
        default: "ArkSE_server/CFN_ArkSEServer.yaml"
        type: string
      dns_hostname:
        description: "Optional hostname players use for the ARK server"
        required: false
        default: ""
        type: string
      vpc_id:
        description: "Optional VPC ID override for create action"
        required: false
        default: ""
        type: string
      subnet_id:
        description: "Optional subnet ID override for create action"
        required: false
        default: ""
        type: string
      server_state_on_create:
        description: "Initial server state when creating the stack"
        required: false
        default: "Stopped"
        type: choice
        options:
          - Running
          - Stopped

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  ROLE_NAME: GitHubActionsOIDCRole
  ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ARKSE_NOTIFIER_STACK_NAME: arkse-discord-notifier
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  control-arkse-stack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/${{ env.ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ArkSE stack config profile
        env:
          ARK_ALLOWED_PLAYER_STEAM_IDS_SECRET: ${{ secrets.ARK_ALLOWED_PLAYER_STEAM_IDS }}
          ARK_ALLOWED_PLAYER_STEAM_IDS_DEFAULT_SECRET: ${{ secrets.ARK_ALLOWED_PLAYER_STEAM_IDS_DEFAULT }}
          ARK_ALLOWED_PLAYER_STEAM_IDS_DEV_SECRET: ${{ secrets.ARK_ALLOWED_PLAYER_STEAM_IDS_DEV }}
        run: |
          set -euo pipefail

          PROFILE='${{ github.event.inputs.stack_config_profile }}'
          INPUT_TEMPLATE='${{ github.event.inputs.template_path }}'
          INPUT_DNS='${{ github.event.inputs.dns_hostname }}'
          INPUT_VPC='${{ github.event.inputs.vpc_id }}'
          INPUT_SUBNET='${{ github.event.inputs.subnet_id }}'

          export PROFILE INPUT_TEMPLATE INPUT_DNS INPUT_VPC INPUT_SUBNET

          python3 - <<'PY' >> "$GITHUB_ENV"
          import json
          import os

          config_path = "ArkSE_server/server-config.json"
          profile = os.environ["PROFILE"]

          config = {}
          if os.path.exists(config_path):
              with open(config_path, "r", encoding="utf-8") as config_file:
                  config = json.load(config_file).get(profile, {})

          def pick(input_env, key, default=""):
              value = os.environ.get(input_env, "")
              if value:
                  return value
              return str(config.get(key, default) or "")

          def bool_string(value):
              normalized = str(value).strip().lower()
              if normalized in ("true", "yes", "1", "on"):
                  return "true"
              if normalized in ("false", "no", "0", "off", ""):
                  return "false"
              raise SystemExit(f"Invalid boolean value for exclusive_join: {value}")

          def add_steam_id(steam_ids, value):
              steam_id = str(value or "").strip()
              if steam_id:
                  steam_ids.append(steam_id)

          def add_steam_ids(steam_ids, value):
              if isinstance(value, list):
                  for item in value:
                      add_steam_id(steam_ids, item)
                  return

              for part in str(value or "").split(","):
                  add_steam_id(steam_ids, part)

          def collect_allowed_player_steam_ids():
              steam_ids = []

              for player in config.get("players", []):
                  if isinstance(player, dict):
                      add_steam_id(steam_ids, player.get("steam_id"))
                  else:
                      add_steam_id(steam_ids, player)

              add_steam_ids(steam_ids, config.get("allowed_player_steam_ids", []))

              normalized_profile = "".join(
                  char if char.isalnum() else "_"
                  for char in profile.upper()
              )
              secret_value = (
                  os.environ.get(f"ARK_ALLOWED_PLAYER_STEAM_IDS_{normalized_profile}_SECRET", "")
                  or os.environ.get("ARK_ALLOWED_PLAYER_STEAM_IDS_SECRET", "")
              )
              add_steam_ids(steam_ids, secret_value)

              deduped = []
              seen = set()
              for steam_id in steam_ids:
                  if not steam_id.isdigit():
                      raise SystemExit(
                          f"Invalid Steam64 ID '{steam_id}'. Use players[].name for display names "
                          "and players[].steam_id for the numeric Steam64 ID."
                      )
                  if steam_id not in seen:
                      seen.add(steam_id)
                      deduped.append(steam_id)

              return ",".join(deduped)

          exclusive_join = bool_string(config.get("exclusive_join", False))
          allowed_player_steam_ids = collect_allowed_player_steam_ids()
          if exclusive_join == "true" and not allowed_player_steam_ids:
              raise SystemExit(
                  "exclusive_join is true, but no Steam64 IDs were found in "
                  "the ARK_ALLOWED_PLAYER_STEAM_IDS secret, players[].steam_id, "
                  "or allowed_player_steam_ids."
              )

          values = {
              "RESOLVED_TEMPLATE_PATH": pick("INPUT_TEMPLATE", "template_path", "ArkSE_server/CFN_ArkSEServer.yaml"),
              "RESOLVED_DNS_HOSTNAME": pick("INPUT_DNS", "dns_hostname", "arkserver.bearynatural.dev"),
              "RESOLVED_VPC_ID": pick("INPUT_VPC", "vpc_id"),
              "RESOLVED_SUBNET_ID": pick("INPUT_SUBNET", "subnet_id"),
              "RESOLVED_ARK_IMAGE": str(config.get("ark_image", "renegademaster/ark-se-dedicated-server:latest") or ""),
              "RESOLVED_CPU": str(config.get("cpu", "4096") or ""),
              "RESOLVED_MEMORY": str(config.get("memory", "8192") or ""),
              "RESOLVED_SERVER_NAME": str(config.get("server_name", "BearyNaturalArk") or ""),
              "RESOLVED_MAP_NAME": str(config.get("map_name", "TheIsland") or ""),
              "RESOLVED_MAX_PLAYERS": str(config.get("max_players", "16") or ""),
              "RESOLVED_GAME_PORT": str(config.get("game_port", "7777") or ""),
              "RESOLVED_GAME_PORT_2": str(config.get("game_port_2", "7778") or ""),
              "RESOLVED_QUERY_PORT": str(config.get("query_port", "27015") or ""),
              "RESOLVED_EXCLUSIVE_JOIN": exclusive_join,
              "RESOLVED_ALLOWED_PLAYER_STEAM_IDS": allowed_player_steam_ids,
              "RESOLVED_AUTO_STOP_IDLE_SECONDS": str(config.get("auto_stop_idle_seconds", "1200") or ""),
              "RESOLVED_LOG_GROUP_NAME": str(config.get("log_group_name", "/ecs/arkse") or ""),
          }

          for key, value in values.items():
              print(f"{key}={value}")
          PY

      - name: Export shared variables
        run: |
          set -euo pipefail
          echo "STACK_NAME=${{ github.event.inputs.stack_name }}" >> "$GITHUB_ENV"
          echo "Using template path: ${RESOLVED_TEMPLATE_PATH}"
          echo "Using DNS hostname: ${RESOLVED_DNS_HOSTNAME}"

      - name: Ensure ArkSE AWS error notifier
        env:
          DISCORD_WEBHOOK_URL_SECRET: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          if aws cloudformation describe-stacks --stack-name "$ARKSE_NOTIFIER_STACK_NAME" >/dev/null 2>&1; then
            if [ -n "$DISCORD_WEBHOOK_URL_SECRET" ]; then
              UPDATE_OUTPUT=$(aws cloudformation update-stack \
                --stack-name "$ARKSE_NOTIFIER_STACK_NAME" \
                --template-body "file://ArkSE_server/CFN_ArkSENotifier.yaml" \
                --parameters ParameterKey=DiscordWebhookUrl,ParameterValue="$DISCORD_WEBHOOK_URL_SECRET" \
                --capabilities CAPABILITY_NAMED_IAM 2>&1) || {
                  if echo "$UPDATE_OUTPUT" | grep -q "No updates are to be performed"; then
                    echo "ArkSE notifier stack already up to date."
                  else
                    echo "$UPDATE_OUTPUT"
                    exit 1
                  fi
                }
            else
              UPDATE_OUTPUT=$(aws cloudformation update-stack \
                --stack-name "$ARKSE_NOTIFIER_STACK_NAME" \
                --template-body "file://ArkSE_server/CFN_ArkSENotifier.yaml" \
                --parameters ParameterKey=DiscordWebhookUrl,UsePreviousValue=true \
                --capabilities CAPABILITY_NAMED_IAM 2>&1) || {
                  if echo "$UPDATE_OUTPUT" | grep -q "No updates are to be performed"; then
                    echo "ArkSE notifier stack already up to date."
                  else
                    echo "$UPDATE_OUTPUT"
                    exit 1
                  fi
                }
            fi

            STATUS=$(aws cloudformation describe-stacks \
              --stack-name "$ARKSE_NOTIFIER_STACK_NAME" \
              --query "Stacks[0].StackStatus" \
              --output text)
            if [ "$STATUS" = "UPDATE_IN_PROGRESS" ] || [ "$STATUS" = "UPDATE_COMPLETE_CLEANUP_IN_PROGRESS" ]; then
              aws cloudformation wait stack-update-complete --stack-name "$ARKSE_NOTIFIER_STACK_NAME"
            fi
          else
            if [ -z "$DISCORD_WEBHOOK_URL_SECRET" ]; then
              echo "Missing GitHub secret DISCORD_WEBHOOK_URL. It is required to create the AWS-side error notifier."
              exit 1
            fi

            aws cloudformation create-stack \
              --stack-name "$ARKSE_NOTIFIER_STACK_NAME" \
              --template-body "file://ArkSE_server/CFN_ArkSENotifier.yaml" \
              --parameters ParameterKey=DiscordWebhookUrl,ParameterValue="$DISCORD_WEBHOOK_URL_SECRET" \
              --capabilities CAPABILITY_NAMED_IAM

            aws cloudformation wait stack-create-complete --stack-name "$ARKSE_NOTIFIER_STACK_NAME"
          fi

          TOPIC_ARN=$(aws cloudformation describe-stacks \
            --stack-name "$ARKSE_NOTIFIER_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='NotificationTopicArn'].OutputValue | [0]" \
            --output text)

          if [ -z "$TOPIC_ARN" ] || [ "$TOPIC_ARN" = "None" ]; then
            echo "Could not resolve ArkSE notifier SNS topic ARN."
            exit 1
          fi

          echo "ARKSE_NOTIFICATION_TOPIC_ARN=$TOPIC_ARN" >> "$GITHUB_ENV"

      - name: Create ArkSE stack
        if: ${{ github.event.inputs.action == 'create' }}
        env:
          ARK_ADMIN_PASSWORD_SECRET: ${{ secrets.ARK_ADMIN_PASSWORD }}
          ARK_SERVER_PASSWORD_SECRET: ${{ secrets.ARK_SERVER_PASSWORD }}
          DISCORD_WEBHOOK_URL_SECRET: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          if [ -z "$ARK_ADMIN_PASSWORD_SECRET" ]; then
            echo "Missing GitHub secret ARK_ADMIN_PASSWORD. Create it before creating the ARK stack."
            exit 1
          fi

          if [ -z "$DISCORD_WEBHOOK_URL_SECRET" ]; then
            echo "Missing GitHub secret DISCORD_WEBHOOK_URL. It is required for AWS-side Discord notifications."
            exit 1
          fi

          if aws cloudformation describe-stacks --stack-name "$STACK_NAME" >/dev/null 2>&1; then
            echo "Stack '$STACK_NAME' already exists. Aborting create."
            exit 1
          fi

          VPC_ID="${RESOLVED_VPC_ID:-}"
          SUBNET_ID="${RESOLVED_SUBNET_ID:-}"

          if [ -z "$VPC_ID" ]; then
            VPC_ID=$(aws ec2 describe-vpcs \
              --filters Name=isDefault,Values=true \
              --query "Vpcs[0].VpcId" \
              --output text)
          fi

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "No VPC resolved. Provide workflow input 'vpc_id'."
            exit 1
          fi

          if [ -z "$SUBNET_ID" ]; then
            SUBNET_ID=$(aws ec2 describe-subnets \
              --filters Name=vpc-id,Values="$VPC_ID" Name=default-for-az,Values=true \
              --query "Subnets[0].SubnetId" \
              --output text)
          fi

          if [ -z "$SUBNET_ID" ] || [ "$SUBNET_ID" = "None" ]; then
            SUBNET_ID=$(aws ec2 describe-subnets \
              --filters Name=vpc-id,Values="$VPC_ID" \
              --query "Subnets[0].SubnetId" \
              --output text)
          fi

          if [ -z "$SUBNET_ID" ] || [ "$SUBNET_ID" = "None" ]; then
            echo "No subnet resolved for VPC '$VPC_ID'. Provide workflow input 'subnet_id'."
            exit 1
          fi

          PARAMETERS_FILE="$RUNNER_TEMP/arkse-create-parameters.json"
          SERVER_STATE_ON_CREATE='${{ github.event.inputs.server_state_on_create }}'
          export PARAMETERS_FILE SERVER_STATE_ON_CREATE VPC_ID SUBNET_ID
          export ARK_ADMIN_PASSWORD_SECRET ARK_SERVER_PASSWORD_SECRET DISCORD_WEBHOOK_URL_SECRET
          export RESOLVED_DNS_HOSTNAME RESOLVED_ARK_IMAGE RESOLVED_CPU RESOLVED_MEMORY
          export RESOLVED_SERVER_NAME RESOLVED_MAP_NAME RESOLVED_MAX_PLAYERS
          export RESOLVED_GAME_PORT RESOLVED_GAME_PORT_2 RESOLVED_QUERY_PORT
          export RESOLVED_EXCLUSIVE_JOIN RESOLVED_ALLOWED_PLAYER_STEAM_IDS
          export RESOLVED_AUTO_STOP_IDLE_SECONDS RESOLVED_LOG_GROUP_NAME STACK_NAME

          python3 - <<'PY'
          import json
          import os

          def env(name):
              return os.environ.get(name, "")

          parameters = [
              {"ParameterKey": "ServerState", "ParameterValue": env("SERVER_STATE_ON_CREATE")},
              {"ParameterKey": "ECSClusterName", "ParameterValue": env("STACK_NAME")},
              {"ParameterKey": "VpcId", "ParameterValue": env("VPC_ID")},
              {"ParameterKey": "SubnetId", "ParameterValue": env("SUBNET_ID")},
              {"ParameterKey": "DnsHostname", "ParameterValue": env("RESOLVED_DNS_HOSTNAME")},
              {"ParameterKey": "ArkImage", "ParameterValue": env("RESOLVED_ARK_IMAGE")},
              {"ParameterKey": "Cpu", "ParameterValue": env("RESOLVED_CPU")},
              {"ParameterKey": "Memory", "ParameterValue": env("RESOLVED_MEMORY")},
              {"ParameterKey": "ServerName", "ParameterValue": env("RESOLVED_SERVER_NAME")},
              {"ParameterKey": "MapName", "ParameterValue": env("RESOLVED_MAP_NAME")},
              {"ParameterKey": "MaxPlayers", "ParameterValue": env("RESOLVED_MAX_PLAYERS")},
              {"ParameterKey": "GamePort", "ParameterValue": env("RESOLVED_GAME_PORT")},
              {"ParameterKey": "GamePort2", "ParameterValue": env("RESOLVED_GAME_PORT_2")},
              {"ParameterKey": "QueryPort", "ParameterValue": env("RESOLVED_QUERY_PORT")},
              {"ParameterKey": "ExclusiveJoin", "ParameterValue": env("RESOLVED_EXCLUSIVE_JOIN")},
              {"ParameterKey": "AllowedPlayerSteamIds", "ParameterValue": env("RESOLVED_ALLOWED_PLAYER_STEAM_IDS")},
              {"ParameterKey": "AutoStopIdleSeconds", "ParameterValue": env("RESOLVED_AUTO_STOP_IDLE_SECONDS")},
              {"ParameterKey": "LogGroupName", "ParameterValue": env("RESOLVED_LOG_GROUP_NAME")},
              {"ParameterKey": "AdminPassword", "ParameterValue": env("ARK_ADMIN_PASSWORD_SECRET")},
              {"ParameterKey": "ServerPassword", "ParameterValue": env("ARK_SERVER_PASSWORD_SECRET")},
              {"ParameterKey": "DiscordWebhookUrl", "ParameterValue": env("DISCORD_WEBHOOK_URL_SECRET")},
          ]

          with open(env("PARAMETERS_FILE"), "w", encoding="utf-8") as parameters_file:
              json.dump(parameters, parameters_file)
          PY

          aws cloudformation create-stack \
            --stack-name "$STACK_NAME" \
            --template-body "file://$RESOLVED_TEMPLATE_PATH" \
            --notification-arns "$ARKSE_NOTIFICATION_TOPIC_ARN" \
            --parameters "file://$PARAMETERS_FILE" \
            --capabilities CAPABILITY_NAMED_IAM

          aws cloudformation wait stack-create-complete --stack-name "$STACK_NAME"

      - name: Start ArkSE stack
        if: ${{ github.event.inputs.action == 'start' }}
        run: |
          set -euo pipefail

          PARAMETERS_FILE="$RUNNER_TEMP/arkse-start-parameters.json"
          EXISTING_PARAMETERS_FILE="$RUNNER_TEMP/arkse-start-existing-parameters.json"
          DESIRED_SERVER_STATE="Running"
          export PARAMETERS_FILE EXISTING_PARAMETERS_FILE DESIRED_SERVER_STATE
          export RESOLVED_DNS_HOSTNAME RESOLVED_ARK_IMAGE RESOLVED_CPU RESOLVED_MEMORY
          export RESOLVED_SERVER_NAME RESOLVED_MAP_NAME RESOLVED_MAX_PLAYERS
          export RESOLVED_GAME_PORT RESOLVED_GAME_PORT_2 RESOLVED_QUERY_PORT
          export RESOLVED_EXCLUSIVE_JOIN RESOLVED_ALLOWED_PLAYER_STEAM_IDS
          export RESOLVED_AUTO_STOP_IDLE_SECONDS RESOLVED_LOG_GROUP_NAME

          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Parameters[].ParameterKey" \
            --output json > "$EXISTING_PARAMETERS_FILE"

          python3 - <<'PY'
          import json
          import os

          def env(name):
              return os.environ.get(name, "")

          with open(env("EXISTING_PARAMETERS_FILE"), "r", encoding="utf-8") as existing_file:
              existing_keys = set(json.load(existing_file))

          previous_value_keys = [
              "ECSClusterName",
              "VpcId",
              "SubnetId",
              "AdminPassword",
              "ServerPassword",
              "DiscordWebhookUrl",
          ]
          missing = [key for key in previous_value_keys if key not in existing_keys]
          if missing:
              raise SystemExit(
                  "Existing stack is missing required parameters that must use previous values: "
                  + ", ".join(missing)
              )

          parameters = [
              {"ParameterKey": "ServerState", "ParameterValue": env("DESIRED_SERVER_STATE")},
              {"ParameterKey": "ECSClusterName", "UsePreviousValue": True},
              {"ParameterKey": "VpcId", "UsePreviousValue": True},
              {"ParameterKey": "SubnetId", "UsePreviousValue": True},
              {"ParameterKey": "DnsHostname", "ParameterValue": env("RESOLVED_DNS_HOSTNAME")},
              {"ParameterKey": "ArkImage", "ParameterValue": env("RESOLVED_ARK_IMAGE")},
              {"ParameterKey": "Cpu", "ParameterValue": env("RESOLVED_CPU")},
              {"ParameterKey": "Memory", "ParameterValue": env("RESOLVED_MEMORY")},
              {"ParameterKey": "LogGroupName", "ParameterValue": env("RESOLVED_LOG_GROUP_NAME")},
              {"ParameterKey": "ServerName", "ParameterValue": env("RESOLVED_SERVER_NAME")},
              {"ParameterKey": "MapName", "ParameterValue": env("RESOLVED_MAP_NAME")},
              {"ParameterKey": "MaxPlayers", "ParameterValue": env("RESOLVED_MAX_PLAYERS")},
              {"ParameterKey": "GamePort", "ParameterValue": env("RESOLVED_GAME_PORT")},
              {"ParameterKey": "GamePort2", "ParameterValue": env("RESOLVED_GAME_PORT_2")},
              {"ParameterKey": "QueryPort", "ParameterValue": env("RESOLVED_QUERY_PORT")},
              {"ParameterKey": "ExclusiveJoin", "ParameterValue": env("RESOLVED_EXCLUSIVE_JOIN")},
              {"ParameterKey": "AllowedPlayerSteamIds", "ParameterValue": env("RESOLVED_ALLOWED_PLAYER_STEAM_IDS")},
              {"ParameterKey": "AutoStopIdleSeconds", "ParameterValue": env("RESOLVED_AUTO_STOP_IDLE_SECONDS")},
              {"ParameterKey": "AdminPassword", "UsePreviousValue": True},
              {"ParameterKey": "ServerPassword", "UsePreviousValue": True},
              {"ParameterKey": "DiscordWebhookUrl", "UsePreviousValue": True},
          ]

          with open(env("PARAMETERS_FILE"), "w", encoding="utf-8") as parameters_file:
              json.dump(parameters, parameters_file)
          PY

          UPDATE_OUTPUT=$(aws cloudformation update-stack \
            --stack-name "$STACK_NAME" \
            --template-body "file://$RESOLVED_TEMPLATE_PATH" \
            --notification-arns "$ARKSE_NOTIFICATION_TOPIC_ARN" \
            --parameters "file://$PARAMETERS_FILE" \
            --capabilities CAPABILITY_NAMED_IAM 2>&1) || {
              if echo "$UPDATE_OUTPUT" | grep -q "No updates are to be performed"; then
                echo "ArkSE stack already started and up to date."
              else
                echo "$UPDATE_OUTPUT"
                exit 1
              fi
            }

          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" \
            --output text)
          if [ "$STATUS" = "UPDATE_IN_PROGRESS" ] || [ "$STATUS" = "UPDATE_COMPLETE_CLEANUP_IN_PROGRESS" ]; then
            aws cloudformation wait stack-update-complete --stack-name "$STACK_NAME"
          fi

      - name: Stop ArkSE stack
        if: ${{ github.event.inputs.action == 'stop' }}
        run: |
          set -euo pipefail

          PARAMETERS_FILE="$RUNNER_TEMP/arkse-stop-parameters.json"
          EXISTING_PARAMETERS_FILE="$RUNNER_TEMP/arkse-stop-existing-parameters.json"
          DESIRED_SERVER_STATE="Stopped"
          export PARAMETERS_FILE EXISTING_PARAMETERS_FILE DESIRED_SERVER_STATE
          export RESOLVED_DNS_HOSTNAME RESOLVED_ARK_IMAGE RESOLVED_CPU RESOLVED_MEMORY
          export RESOLVED_SERVER_NAME RESOLVED_MAP_NAME RESOLVED_MAX_PLAYERS
          export RESOLVED_GAME_PORT RESOLVED_GAME_PORT_2 RESOLVED_QUERY_PORT
          export RESOLVED_EXCLUSIVE_JOIN RESOLVED_ALLOWED_PLAYER_STEAM_IDS
          export RESOLVED_AUTO_STOP_IDLE_SECONDS RESOLVED_LOG_GROUP_NAME

          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Parameters[].ParameterKey" \
            --output json > "$EXISTING_PARAMETERS_FILE"

          python3 - <<'PY'
          import json
          import os

          def env(name):
              return os.environ.get(name, "")

          with open(env("EXISTING_PARAMETERS_FILE"), "r", encoding="utf-8") as existing_file:
              existing_keys = set(json.load(existing_file))

          previous_value_keys = [
              "ECSClusterName",
              "VpcId",
              "SubnetId",
              "AdminPassword",
              "ServerPassword",
              "DiscordWebhookUrl",
          ]
          missing = [key for key in previous_value_keys if key not in existing_keys]
          if missing:
              raise SystemExit(
                  "Existing stack is missing required parameters that must use previous values: "
                  + ", ".join(missing)
              )

          parameters = [
              {"ParameterKey": "ServerState", "ParameterValue": env("DESIRED_SERVER_STATE")},
              {"ParameterKey": "ECSClusterName", "UsePreviousValue": True},
              {"ParameterKey": "VpcId", "UsePreviousValue": True},
              {"ParameterKey": "SubnetId", "UsePreviousValue": True},
              {"ParameterKey": "DnsHostname", "ParameterValue": env("RESOLVED_DNS_HOSTNAME")},
              {"ParameterKey": "ArkImage", "ParameterValue": env("RESOLVED_ARK_IMAGE")},
              {"ParameterKey": "Cpu", "ParameterValue": env("RESOLVED_CPU")},
              {"ParameterKey": "Memory", "ParameterValue": env("RESOLVED_MEMORY")},
              {"ParameterKey": "LogGroupName", "ParameterValue": env("RESOLVED_LOG_GROUP_NAME")},
              {"ParameterKey": "ServerName", "ParameterValue": env("RESOLVED_SERVER_NAME")},
              {"ParameterKey": "MapName", "ParameterValue": env("RESOLVED_MAP_NAME")},
              {"ParameterKey": "MaxPlayers", "ParameterValue": env("RESOLVED_MAX_PLAYERS")},
              {"ParameterKey": "GamePort", "ParameterValue": env("RESOLVED_GAME_PORT")},
              {"ParameterKey": "GamePort2", "ParameterValue": env("RESOLVED_GAME_PORT_2")},
              {"ParameterKey": "QueryPort", "ParameterValue": env("RESOLVED_QUERY_PORT")},
              {"ParameterKey": "ExclusiveJoin", "ParameterValue": env("RESOLVED_EXCLUSIVE_JOIN")},
              {"ParameterKey": "AllowedPlayerSteamIds", "ParameterValue": env("RESOLVED_ALLOWED_PLAYER_STEAM_IDS")},
              {"ParameterKey": "AutoStopIdleSeconds", "ParameterValue": env("RESOLVED_AUTO_STOP_IDLE_SECONDS")},
              {"ParameterKey": "AdminPassword", "UsePreviousValue": True},
              {"ParameterKey": "ServerPassword", "UsePreviousValue": True},
              {"ParameterKey": "DiscordWebhookUrl", "UsePreviousValue": True},
          ]

          with open(env("PARAMETERS_FILE"), "w", encoding="utf-8") as parameters_file:
              json.dump(parameters, parameters_file)
          PY

          UPDATE_OUTPUT=$(aws cloudformation update-stack \
            --stack-name "$STACK_NAME" \
            --template-body "file://$RESOLVED_TEMPLATE_PATH" \
            --notification-arns "$ARKSE_NOTIFICATION_TOPIC_ARN" \
            --parameters "file://$PARAMETERS_FILE" \
            --capabilities CAPABILITY_NAMED_IAM 2>&1) || {
              if echo "$UPDATE_OUTPUT" | grep -q "No updates are to be performed"; then
                echo "ArkSE stack already stopped and up to date."
              else
                echo "$UPDATE_OUTPUT"
                exit 1
              fi
            }

          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" \
            --output text)
          if [ "$STATUS" = "UPDATE_IN_PROGRESS" ] || [ "$STATUS" = "UPDATE_COMPLETE_CLEANUP_IN_PROGRESS" ]; then
            aws cloudformation wait stack-update-complete --stack-name "$STACK_NAME"
          fi

      - name: Delete ArkSE stack
        if: ${{ github.event.inputs.action == 'delete' }}
        run: |
          set -euo pipefail
          aws cloudformation delete-stack --stack-name "$STACK_NAME"
          aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME"

      - name: Ask AWS notifier to report workflow failure
        if: ${{ failure() }}
        run: |
          set +e
          ACTION='${{ github.event.inputs.action }}'
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null)
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ArkDiscordFunctionName'].OutputValue | [0]" \
            --output text 2>/dev/null)
          STACK_EVENTS=$(aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" \
            --query "StackEvents[?contains(ResourceStatus, 'FAILED') || contains(ResourceStatus, 'ROLLBACK')].[LogicalResourceId,ResourceStatus,ResourceStatusReason] | [0:5]" \
            --output text 2>/dev/null)

          if [ -z "$FUNCTION_NAME" ] || [ "$FUNCTION_NAME" = "None" ]; then
            echo "No AWS notifier Lambda found for stack '$STACK_NAME'."
            exit 0
          fi

          export ACTION STACK_STATUS STACK_EVENTS STACK_NAME
          PAYLOAD=$(python3 - <<'PY'
          import json
          import os

          message = (
              f"ARK workflow action '{os.environ.get('ACTION')}' failed for stack '{os.environ.get('STACK_NAME')}'.\n"
              f"CloudFormation status: {os.environ.get('STACK_STATUS') or 'unknown'}\n"
              f"{os.environ.get('STACK_EVENTS') or 'No failed stack event details found.'}"
          )
          print(json.dumps({"manualAction": "notify", "message": message}))
          PY
          )

          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --cli-binary-format raw-in-base64-out \
            --payload "$PAYLOAD" \
            "$RUNNER_TEMP/arkse-notifier-response.json" >/dev/null 2>&1 || true
