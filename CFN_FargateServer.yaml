AWSTemplateFormatVersion: "2010-09-09"
Description: Simplified Minecraft Server on ECS Fargate using Default VPC and EFS

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Provide the ID of an existing public subnet from your default VPC

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Provide the ID of the VPC that contains the provided subnet

  ServerState:
    Type: String
    Default: Stopped
    AllowedValues:
      - Running
      - Stopped
    Description: Toggle between 'Running' or 'Stopped' to set ECS desired count.

  ECSClusterName:
    Type: String

  MinecraftImageTag:
    Type: String
    Default: latest

  Memory:
    Type: String

  Cpu:
    Type: String

  Seed:
    Type: String
    Description: The seed used to generate the world

  Whitelist:
    Type: String
    Description: Usernames of your friends

  AdminPlayerNames:
    Type: String
    Description: Op/Administrator Players

  LogGroupName:
    Type: String
    Description: (Optional - An empty value disables this feature)

  DnsHostname:
    Type: String
    Description: Optional DNS hostname players use (for example mc.yourdomain.example)

  DnsUpdateUrl:
    Type: String
    Description: Optional DNS direct update URL. Prefer passing from workflow/secrets instead of storing in stack params.
    NoEcho: true
    Default: ""

  AutoStopWhenIdle:
    Type: String
    Default: "TRUE"
    AllowedValues:
      - "TRUE"
      - "FALSE"
    Description: Automatically stop the server task when no players are online.

  AutoStopIdleSeconds:
    Type: String
    Default: "1200"
    AllowedPattern: "^[0-9]+$"
    Description: Seconds with no players online before the server shuts itself down.

Mappings:
  ServerState:
    Running:
      DesiredCapacity: 1
    Stopped:
      DesiredCapacity: 0

Conditions:
  HasDnsHostname:
    Fn::Not:
      - Fn::Equals:
          - Ref: DnsHostname
          - ""
  HasDnsUpdateUrl:
    Fn::Not:
      - Fn::Equals:
          - Ref: DnsUpdateUrl
          - ""

Resources:
  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupName
      RetentionInDays: 7

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting

  ECSTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - FromPort: 25565
          ToPort: 25565
          IpProtocol: tcp
          CidrIp: 0.0.0.0/0

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow NFS access from ECS tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref ECSTaskSecurityGroup

  EFSMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !GetAtt EFSFileSystem.FileSystemId
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref EFSSecurityGroup

  Ec2Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${AWS::StackName}-ec2"
      GroupDescription: !Sub "${AWS::StackName}-ec2"
      SecurityGroupIngress:
        - FromPort: 25565
          ToPort: 25565
          IpProtocol: tcp
          CidrIp: 0.0.0.0/0
      VpcId: !Ref VpcId

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ECSClusterName

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        - arn:aws:iam::aws:policy/AmazonElasticFileSystemClientReadWriteAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  IdleShutdownLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-idle-shutdown-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: idle-shutdown-cloudformation
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:UpdateStack
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*"
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                Resource: !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:service/${ECSClusterName}/*"
              - Effect: Allow
                Action:
                  - ecs:DescribeClusters
                Resource: !GetAtt ECSCluster.Arn

  IdleShutdownFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-idle-shutdown"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt IdleShutdownLambdaRole.Arn
      Timeout: 60
      Environment:
        Variables:
          STACK_NAME: !Ref AWS::StackName
          ECS_CLUSTER_NAME: !Ref ECSClusterName
      Code:
        ZipFile: |
          import os

          import boto3
          from botocore.exceptions import ClientError

          cloudformation = boto3.client("cloudformation")
          ecs = boto3.client("ecs")


          def handler(event, context):
              containers = event.get("detail", {}).get("containers", [])
              minecraft = next((c for c in containers if c.get("name") == "minecraft"), None)

              if not minecraft:
                  return {"status": "ignored", "reason": "not minecraft task"}

              if str(minecraft.get("exitCode")) != "0":
                  return {"status": "ignored", "reason": "minecraft task did not exit cleanly"}

              service_group = event.get("detail", {}).get("group", "")
              if not service_group.startswith("service:"):
                  return {"status": "ignored", "reason": "stopped task was not owned by an ECS service"}

              service_name = service_group.split(":", 1)[1]
              ecs.update_service(
                  cluster=os.environ["ECS_CLUSTER_NAME"],
                  service=service_name,
                  desiredCount=0,
              )

              stack_name = os.environ["STACK_NAME"]
              stack = cloudformation.describe_stacks(StackName=stack_name)["Stacks"][0]
              stack_status = stack.get("StackStatus", "")
              if stack_status.endswith("_IN_PROGRESS"):
                  return {"status": "ecs_stopped", "reason": f"stack busy: {stack_status}"}

              parameters = stack.get("Parameters", [])

              if any(p["ParameterKey"] == "ServerState" and p.get("ParameterValue") == "Stopped" for p in parameters):
                  return {"status": "ignored", "reason": "stack already stopped"}

              updated_parameters = []
              saw_server_state = False
              for parameter in parameters:
                  key = parameter["ParameterKey"]
                  if key == "ServerState":
                      updated_parameters.append({"ParameterKey": key, "ParameterValue": "Stopped"})
                      saw_server_state = True
                  else:
                      updated_parameters.append({"ParameterKey": key, "UsePreviousValue": True})

              if not saw_server_state:
                  updated_parameters.append({"ParameterKey": "ServerState", "ParameterValue": "Stopped"})

              try:
                  response = cloudformation.update_stack(
                      StackName=stack_name,
                      UsePreviousTemplate=True,
                      Parameters=updated_parameters,
                      Capabilities=["CAPABILITY_NAMED_IAM"],
                  )
              except ClientError as error:
                  message = str(error)
                  if "No updates are to be performed" in message:
                      return {"status": "ecs_stopped", "reason": "no stack update needed"}
                  raise

              return {"status": "ecs_stopped", "stack_id": response["StackId"]}

  IdleShutdownTaskStoppedRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-idle-shutdown"
      EventPattern:
        source:
          - aws.ecs
        detail-type:
          - ECS Task State Change
        detail:
          clusterArn:
            - !GetAtt ECSCluster.Arn
          lastStatus:
            - STOPPED
          containers:
            name:
              - minecraft
      Targets:
        - Arn: !GetAtt IdleShutdownFunction.Arn
          Id: IdleShutdownFunction

  IdleShutdownInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IdleShutdownFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt IdleShutdownTaskStoppedRule.Arn

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: MinecraftFargateTask
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      ContainerDefinitions:
        - Name: minecraft
          Image: !Sub "itzg/minecraft-server:${MinecraftImageTag}"
          Essential: true
          PortMappings:
            - ContainerPort: 25565
              Protocol: tcp
          Environment:
            - Name: EULA
              Value: "TRUE"
            - Name: SEED
              Value: !Ref Seed
            - Name: WHITELIST
              Value: !Ref Whitelist
            - Name: OPS
              Value: !Ref AdminPlayerNames
            - Name: ENABLE_AUTOSTOP
              Value: !Ref AutoStopWhenIdle
            - Name: AUTOSTOP_TIMEOUT_EST
              Value: !Ref AutoStopIdleSeconds
            - Name: AUTOSTOP_TIMEOUT_INIT
              Value: !Ref AutoStopIdleSeconds
            - Name: AUTOSTOP_PERIOD
              Value: "10"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroupName
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: minecraft
          MountPoints:
            - ContainerPath: /data
              SourceVolume: minecraftdata
      Volumes:
        - Name: minecraftdata
          EFSVolumeConfiguration:
            FilesystemId: !GetAtt EFSFileSystem.FileSystemId

  MinecraftNLB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${AWS::StackName}-nlb"
      Type: network
      Scheme: internet-facing
      Subnets:
        - !Ref SubnetId

  MinecraftTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AWS::StackName}-tg"
      Port: 25565
      Protocol: TCP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckProtocol: TCP
      HealthCheckPort: traffic-port
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      HealthCheckIntervalSeconds: 30

  MinecraftListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MinecraftNLB
      Port: 25565
      Protocol: TCP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MinecraftTargetGroup

  ECSService:
    Type: AWS::ECS::Service
    DependsOn:
      - MinecraftNLB
      - MinecraftTargetGroup
      - MinecraftListener
    Properties:
      Cluster: !Ref ECSCluster
      DesiredCount:
        Fn::FindInMap:
          - ServerState
          - Ref: ServerState
          - DesiredCapacity
      LaunchType: FARGATE
      TaskDefinition: !Ref TaskDefinition
      HealthCheckGracePeriodSeconds: 120
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref SubnetId
          SecurityGroups:
            - !Ref ECSTaskSecurityGroup
      LoadBalancers:
        - TargetGroupArn: !Ref MinecraftTargetGroup
          ContainerName: minecraft
          ContainerPort: 25565

  S3BackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ECSClusterName}-${Seed}"

  BackupTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ECSClusterName}-minecraft-backup"
      Cpu: "1024"
      Memory: "2048"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt ExecutionRole.Arn
      ContainerDefinitions:
        - Name: minecraft-backup
          Image: amazonlinux
          Command:
            - /bin/sh
            - -c
            - |
              yum install -y zip awscli && \
              if [ ! -d /data/world ]; then \
                echo "No Minecraft world directory found at /data/world"; \
                ls -la /data; \
                exit 1; \
              fi && \
              BACKUP_FILE="/tmp/world_$(date +%Y%m%d%H%M%S).zip" && \
              zip -r "$BACKUP_FILE" /data/world && \
              BACKUP_KEY="$(basename "$BACKUP_FILE")" && \
              S3_URI="s3://${BACKUP_BUCKET_NAME}/${BACKUP_KEY}" && \
              echo "Uploading backup to ${S3_URI}" && \
              aws s3 cp "$BACKUP_FILE" "$S3_URI" && \
              printf "%s\n" "$S3_URI" > /tmp/latest-backup.txt && \
              aws s3 cp /tmp/latest-backup.txt "s3://${BACKUP_BUCKET_NAME}/latest-backup.txt"
          Essential: true
          Environment:
            - Name: ECSClusterName
              Value: !Ref ECSClusterName
            - Name: Seed
              Value: !Ref Seed
            - Name: BACKUP_BUCKET_NAME
              Value: !Ref S3BackupBucket
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroupName
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backup
          MountPoints:
            - ContainerPath: /data
              SourceVolume: minecraftdata
      Volumes:
        - Name: minecraftdata
          EFSVolumeConfiguration:
            FilesystemId: !GetAtt EFSFileSystem.FileSystemId

Outputs:
  DNSUpdateInfo:
    Description: Public IP will be visible under ECS Service task networking tab once task is running.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/ecs/v2/clusters/${ECSClusterName}/services"
  ECSClusterName:
    Description: Name of the ECS cluster
    Value: !Ref ECSClusterName
  MinecraftPublicAccess:
    Description: Subnet to use to access your Minecraft server (port 25565)
    Value: !Ref SubnetId
  MinecraftConnectionHost:
    Description: Use DNS hostname when provided; otherwise connect via current task public IP from ECS console.
    Value: !If
      - HasDnsHostname
      - !Ref DnsHostname
      - "(No DNS hostname configured)"
  DnsUpdateConfigured:
    Description: Indicates whether DNS update URL parameter was set.
    Value: !If
      - HasDnsUpdateUrl
      - "true"
      - "false"
  LoadBalancerDNS:
    Description: DNS of the load balancer created by the ECS service (visible once service is running)
    Value: !GetAtt MinecraftNLB.DNSName
