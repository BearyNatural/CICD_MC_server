# This GitHub Actions workflow can create, start, stop, and delete a CloudFormation stack that manages a Minecraft server on ECS Fargate.

name: Minecraft Stack Control

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What do you want to do?"
        required: true
        type: choice
        options:
          - create
          - start
          - stop
          - delete
      stack_name:
        description: "CloudFormation stack name"
        required: true
        type: string
      stack_config_profile:
        description: "Configuration profile from stack-config.json"
        required: false
        default: "default"
        type: string
      template_path:
        description: "Template path for create action"
        required: false
        default: "CFN_FargateServer.yaml"
        type: string
      dns_hostname:
        description: "Optional stable Minecraft hostname override"
        required: false
        default: ""
        type: string
      vpc_id:
        description: "Optional VPC ID override for create action"
        required: false
        default: ""
        type: string
      subnet_id:
        description: "Optional subnet ID override for create action"
        required: false
        default: ""
        type: string
      server_state_on_create:
        description: "Initial server state when creating the stack"
        required: false
        default: "Stopped"
        type: choice
        options:
          - Running
          - Stopped
      include_backup_link:
        description: "Include latest S3 backup pre-signed URL in stop notification"
        required: false
        default: "yes"
        type: choice
        options:
          - yes
          - no

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  ROLE_NAME: GitHubActionsOIDCRole
  ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  control-stack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/${{ env.ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Export shared variables
        run: |
          echo "STACK_NAME=${{ github.event.inputs.stack_name }}" >> "$GITHUB_ENV"

      - name: Resolve stack config profile
        run: |
          set -euo pipefail

          PROFILE='${{ github.event.inputs.stack_config_profile }}'
          INPUT_TEMPLATE='${{ github.event.inputs.template_path }}'
          INPUT_DNS='${{ github.event.inputs.dns_hostname }}'
          INPUT_VPC='${{ github.event.inputs.vpc_id }}'
          INPUT_SUBNET='${{ github.event.inputs.subnet_id }}'

          RESOLVED_TEMPLATE="$INPUT_TEMPLATE"
          RESOLVED_DNS="$INPUT_DNS"
          RESOLVED_VPC="$INPUT_VPC"
          RESOLVED_SUBNET="$INPUT_SUBNET"
          RESOLVED_MINECRAFT_IMAGE_TAG=""
          RESOLVED_MEMORY=""
          RESOLVED_CPU=""
          RESOLVED_SEED=""
          RESOLVED_WHITELIST=""
          RESOLVED_ADMIN_PLAYERS=""
          RESOLVED_LOG_GROUP_NAME=""

          if [ -f "stack-config.json" ]; then
            RESOLVED_TEMPLATE=$(python3 -c 'import json,sys; p=sys.argv[1]; i=sys.argv[2]; d=json.load(open("stack-config.json","r",encoding="utf-8")); print(i or str(d.get(p,{}).get("template_path","") or ""))' "$PROFILE" "$INPUT_TEMPLATE")
            RESOLVED_DNS=$(python3 -c 'import json,sys; p=sys.argv[1]; i=sys.argv[2]; d=json.load(open("stack-config.json","r",encoding="utf-8")); print(i or str(d.get(p,{}).get("dns_hostname","") or ""))' "$PROFILE" "$INPUT_DNS")
            RESOLVED_VPC=$(python3 -c 'import json,sys; p=sys.argv[1]; i=sys.argv[2]; d=json.load(open("stack-config.json","r",encoding="utf-8")); print(i or str(d.get(p,{}).get("vpc_id","") or ""))' "$PROFILE" "$INPUT_VPC")
            RESOLVED_SUBNET=$(python3 -c 'import json,sys; p=sys.argv[1]; i=sys.argv[2]; d=json.load(open("stack-config.json","r",encoding="utf-8")); print(i or str(d.get(p,{}).get("subnet_id","") or ""))' "$PROFILE" "$INPUT_SUBNET")
            RESOLVED_MINECRAFT_IMAGE_TAG=$(python3 -c 'import json,sys; p=sys.argv[1]; d=json.load(open("stack-config.json","r",encoding="utf-8")); print(str(d.get(p,{}).get("minecraft_image_tag","") or ""))' "$PROFILE")
            RESOLVED_MEMORY=$(python3 -c 'import json,sys; p=sys.argv[1]; d=json.load(open("stack-config.json","r",encoding="utf-8")); print(str(d.get(p,{}).get("memory","") or ""))' "$PROFILE")
            RESOLVED_CPU=$(python3 -c 'import json,sys; p=sys.argv[1]; d=json.load(open("stack-config.json","r",encoding="utf-8")); print(str(d.get(p,{}).get("cpu","") or ""))' "$PROFILE")
            RESOLVED_SEED=$(python3 -c 'import json,sys; p=sys.argv[1]; d=json.load(open("stack-config.json","r",encoding="utf-8")); print(str(d.get(p,{}).get("seed","") or ""))' "$PROFILE")
            RESOLVED_WHITELIST=$(python3 -c 'import json,sys; p=sys.argv[1]; d=json.load(open("stack-config.json","r",encoding="utf-8")); print(str(d.get(p,{}).get("whitelist","") or ""))' "$PROFILE")
            RESOLVED_ADMIN_PLAYERS=$(python3 -c 'import json,sys; p=sys.argv[1]; d=json.load(open("stack-config.json","r",encoding="utf-8")); print(str(d.get(p,{}).get("admin_player_names","") or ""))' "$PROFILE")
            RESOLVED_LOG_GROUP_NAME=$(python3 -c 'import json,sys; p=sys.argv[1]; d=json.load(open("stack-config.json","r",encoding="utf-8")); print(str(d.get(p,{}).get("log_group_name","") or ""))' "$PROFILE")
          fi

          echo "RESOLVED_TEMPLATE_PATH=$RESOLVED_TEMPLATE" >> "$GITHUB_ENV"
          echo "RESOLVED_DNS_HOSTNAME=$RESOLVED_DNS" >> "$GITHUB_ENV"
          echo "RESOLVED_VPC_ID=$RESOLVED_VPC" >> "$GITHUB_ENV"
          echo "RESOLVED_SUBNET_ID=$RESOLVED_SUBNET" >> "$GITHUB_ENV"
          echo "RESOLVED_MINECRAFT_IMAGE_TAG=$RESOLVED_MINECRAFT_IMAGE_TAG" >> "$GITHUB_ENV"
          echo "RESOLVED_MEMORY=$RESOLVED_MEMORY" >> "$GITHUB_ENV"
          echo "RESOLVED_CPU=$RESOLVED_CPU" >> "$GITHUB_ENV"
          echo "RESOLVED_SEED=$RESOLVED_SEED" >> "$GITHUB_ENV"
          echo "RESOLVED_WHITELIST=$RESOLVED_WHITELIST" >> "$GITHUB_ENV"
          echo "RESOLVED_ADMIN_PLAYER_NAMES=$RESOLVED_ADMIN_PLAYERS" >> "$GITHUB_ENV"
          echo "RESOLVED_LOG_GROUP_NAME=$RESOLVED_LOG_GROUP_NAME" >> "$GITHUB_ENV"

          echo "Using config profile: $PROFILE"
          echo "Resolved template path: $RESOLVED_TEMPLATE"
          echo "Resolved DNS hostname: ${RESOLVED_DNS:-<none>}"

      - name: Create stack
        if: ${{ github.event.inputs.action == 'create' }}
        run: |
          set -euo pipefail
          echo "Creating stack: $STACK_NAME"

          if aws cloudformation describe-stacks --stack-name "$STACK_NAME" >/dev/null 2>&1; then
            echo "Stack '$STACK_NAME' already exists. Aborting create."
            exit 1
          fi

          TEMPLATE_PATH="${RESOLVED_TEMPLATE_PATH:-${{ github.event.inputs.template_path }}}"
          DNS_HOSTNAME_RESOLVED="${RESOLVED_DNS_HOSTNAME:-${{ github.event.inputs.dns_hostname }}}"
          VPC_ID="${RESOLVED_VPC_ID:-${{ github.event.inputs.vpc_id }}}"
          SUBNET_ID="${RESOLVED_SUBNET_ID:-${{ github.event.inputs.subnet_id }}}"

          if [ -z "$VPC_ID" ]; then
            VPC_ID=$(aws ec2 describe-vpcs \
              --filters Name=isDefault,Values=true \
              --query "Vpcs[0].VpcId" \
              --output text)
          fi

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "No VPC resolved. Provide workflow input 'vpc_id'."
            exit 1
          fi

          if [ -z "$SUBNET_ID" ]; then
            SUBNET_ID=$(aws ec2 describe-subnets \
              --filters Name=vpc-id,Values="$VPC_ID" Name=default-for-az,Values=true \
              --query "Subnets[0].SubnetId" \
              --output text)
          fi

          if [ -z "$SUBNET_ID" ] || [ "$SUBNET_ID" = "None" ]; then
            SUBNET_ID=$(aws ec2 describe-subnets \
              --filters Name=vpc-id,Values="$VPC_ID" \
              --query "Subnets[0].SubnetId" \
              --output text)
          fi

          if [ -z "$SUBNET_ID" ] || [ "$SUBNET_ID" = "None" ]; then
            echo "No subnet resolved for VPC '$VPC_ID'. Provide workflow input 'subnet_id'."
            exit 1
          fi

          echo "Using VPC: $VPC_ID"
          echo "Using Subnet: $SUBNET_ID"
          echo "Using template path: $TEMPLATE_PATH"

          PARAMS=(
            "ParameterKey=ServerState,ParameterValue=${{ github.event.inputs.server_state_on_create }}"
            "ParameterKey=DnsHostname,ParameterValue=$DNS_HOSTNAME_RESOLVED"
            "ParameterKey=ECSClusterName,ParameterValue=$STACK_NAME"
            "ParameterKey=VpcId,ParameterValue=$VPC_ID"
            "ParameterKey=SubnetId,ParameterValue=$SUBNET_ID"
          )

          if [ -n "${RESOLVED_MINECRAFT_IMAGE_TAG:-}" ]; then
            PARAMS+=("ParameterKey=MinecraftImageTag,ParameterValue=$RESOLVED_MINECRAFT_IMAGE_TAG")
          fi
          if [ -n "${RESOLVED_MEMORY:-}" ]; then
            PARAMS+=("ParameterKey=Memory,ParameterValue=$RESOLVED_MEMORY")
          fi
          if [ -n "${RESOLVED_CPU:-}" ]; then
            PARAMS+=("ParameterKey=Cpu,ParameterValue=$RESOLVED_CPU")
          fi
          if [ -n "${RESOLVED_SEED:-}" ]; then
            PARAMS+=("ParameterKey=Seed,ParameterValue=$RESOLVED_SEED")
          fi
          if [ -n "${RESOLVED_WHITELIST:-}" ]; then
            PARAMS+=("ParameterKey=Whitelist,ParameterValue=$RESOLVED_WHITELIST")
          fi
          if [ -n "${RESOLVED_ADMIN_PLAYER_NAMES:-}" ]; then
            PARAMS+=("ParameterKey=AdminPlayerNames,ParameterValue=$RESOLVED_ADMIN_PLAYER_NAMES")
          fi
          if [ -n "${RESOLVED_LOG_GROUP_NAME:-}" ]; then
            PARAMS+=("ParameterKey=LogGroupName,ParameterValue=$RESOLVED_LOG_GROUP_NAME")
          fi

          aws cloudformation create-stack \
            --stack-name "$STACK_NAME" \
            --template-body "file://$TEMPLATE_PATH" \
            --parameters "${PARAMS[@]}" \
            --capabilities CAPABILITY_NAMED_IAM

          aws cloudformation wait stack-create-complete --stack-name "$STACK_NAME"

          ELB_DNS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='LoadBalancerDNS'].OutputValue" \
            --output text)

          echo "ELB_DNS=$ELB_DNS" >> "$GITHUB_ENV"

          echo "Load Balancer DNS: $ELB_DNS"

      - name: Start selected stack
        if: ${{ github.event.inputs.action == 'start' }}
        run: |
          set -euo pipefail
          echo "Starting stack: $STACK_NAME"

          if ! aws cloudformation update-stack \
            --stack-name "$STACK_NAME" \
            --use-previous-template \
            --parameters \
              ParameterKey=ServerState,ParameterValue=Running \
              ParameterKey=SubnetId,UsePreviousValue=true \
              ParameterKey=VpcId,UsePreviousValue=true \
              ParameterKey=ECSClusterName,UsePreviousValue=true \
              ParameterKey=MinecraftImageTag,UsePreviousValue=true \
              ParameterKey=Memory,UsePreviousValue=true \
              ParameterKey=Cpu,UsePreviousValue=true \
              ParameterKey=Seed,UsePreviousValue=true \
              ParameterKey=Whitelist,UsePreviousValue=true \
              ParameterKey=AdminPlayerNames,UsePreviousValue=true \
              ParameterKey=LogGroupName,UsePreviousValue=true \
              ParameterKey=DnsHostname,UsePreviousValue=true \
              ParameterKey=DnsUpdateUrl,UsePreviousValue=true \
            --capabilities CAPABILITY_NAMED_IAM; then
            echo "No changes to apply or start update failed. Checking status..."
          fi

      - name: Wait for start to complete
        if: ${{ github.event.inputs.action == 'start' }}
        run: |
          set -euo pipefail
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" \
            --output text)
          if [ "$STATUS" = "UPDATE_IN_PROGRESS" ] || [ "$STATUS" = "UPDATE_COMPLETE_CLEANUP_IN_PROGRESS" ]; then
            aws cloudformation wait stack-update-complete --stack-name "$STACK_NAME"
          fi
      - name: Get Load Balancer DNS
        if: ${{ github.event.inputs.action == 'start' || (github.event.inputs.action == 'create' && github.event.inputs.server_state_on_create == 'Running') }}
        run: |
          set -euo pipefail

          ELB_DNS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='LoadBalancerDNS'].OutputValue" \
            --output text)

          echo "ELB_DNS=$ELB_DNS" >> "$GITHUB_ENV"

          echo "Load Balancer DNS: $ELB_DNS"

      - name: Notify Discord (create)
        if: ${{ github.event.inputs.action == 'create' }}
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord notification."
            exit 0
          fi

          STACK_LINK="https://${{ env.AWS_REGION }}.console.aws.amazon.com/cloudformation/home?region=${{ env.AWS_REGION }}#/stacks"

          DNS_NAME="${RESOLVED_DNS_HOSTNAME:-${{ github.event.inputs.dns_hostname }}}"

          MSG="Created Minecraft stack '${STACK_NAME}'.
          Initial state: ${{ github.event.inputs.server_state_on_create }}

          Minecraft address:
          ${DNS_NAME}

          Load balancer DNS:
          ${ELB_DNS:-not available}

          PAYLOAD=$(MSG="$MSG" python3 -c 'import json, os; print(json.dumps({"content": os.environ["MSG"]}))')

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Notify Discord (start)
        if: ${{ github.event.inputs.action == 'start' }}
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord notification."
            exit 0
          fi

          DNS_NAME="${RESOLVED_DNS_HOSTNAME:-${{ github.event.inputs.dns_hostname }}}"

          if [ -z "$DNS_NAME" ]; then
            DNS_NAME=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query "Stacks[0].Outputs[?OutputKey=='MinecraftConnectionHost'].OutputValue | [0]" \
              --output text)
          fi

          if [ -z "$DNS_NAME" ] || [ "$DNS_NAME" = "None" ] || [ "$DNS_NAME" = "(No DNS hostname configured)" ]; then
            DNS_NAME=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query "Stacks[0].Parameters[?ParameterKey=='DnsHostname'].ParameterValue | [0]" \
              --output text)
          fi

          MSG="The Minecraft server has started. Please join the game at \"${DNS_NAME}\"."

          PAYLOAD=$(MSG="$MSG" python3 -c 'import json, os; print(json.dumps({"content": os.environ["MSG"]}))')

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Refresh stack template before backup
        if: ${{ github.event.inputs.action == 'stop' }}
        run: |
          set -euo pipefail
          echo "Refreshing stack template before backup: $STACK_NAME"

          TEMPLATE_PATH="${RESOLVED_TEMPLATE_PATH:-${{ github.event.inputs.template_path }}}"
          UPDATE_OUTPUT=$(aws cloudformation update-stack \
            --stack-name "$STACK_NAME" \
            --template-body "file://$TEMPLATE_PATH" \
            --parameters \
              ParameterKey=ServerState,UsePreviousValue=true \
              ParameterKey=SubnetId,UsePreviousValue=true \
              ParameterKey=VpcId,UsePreviousValue=true \
              ParameterKey=ECSClusterName,UsePreviousValue=true \
              ParameterKey=MinecraftImageTag,UsePreviousValue=true \
              ParameterKey=Memory,UsePreviousValue=true \
              ParameterKey=Cpu,UsePreviousValue=true \
              ParameterKey=Seed,UsePreviousValue=true \
              ParameterKey=Whitelist,UsePreviousValue=true \
              ParameterKey=AdminPlayerNames,UsePreviousValue=true \
              ParameterKey=LogGroupName,UsePreviousValue=true \
              ParameterKey=DnsHostname,UsePreviousValue=true \
              ParameterKey=DnsUpdateUrl,UsePreviousValue=true \
            --capabilities CAPABILITY_NAMED_IAM 2>&1) || {
              if echo "$UPDATE_OUTPUT" | grep -q "No updates are to be performed"; then
                echo "Stack template already up to date."
              else
                echo "$UPDATE_OUTPUT"
                exit 1
              fi
            }

          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" \
            --output text)
          if [ "$STATUS" = "UPDATE_IN_PROGRESS" ] || [ "$STATUS" = "UPDATE_COMPLETE_CLEANUP_IN_PROGRESS" ]; then
            aws cloudformation wait stack-update-complete --stack-name "$STACK_NAME"
          fi

      - name: Run ECS Backup Task
        if: ${{ github.event.inputs.action == 'stop' }}
        run: |
          set -euo pipefail
          echo "Running ECS backup task for stack: $STACK_NAME"

          CLUSTER_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ECSClusterName'].OutputValue" \
            --output text)

          if [ -z "$CLUSTER_NAME" ] || [ "$CLUSTER_NAME" = "None" ]; then
            echo "Could not resolve cluster name; skipping backup task."
            exit 0
          fi

          TASK_DEF_ARN=$(aws cloudformation describe-stack-resource \
            --stack-name "$STACK_NAME" \
            --logical-resource-id BackupTaskDefinition \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text)

          if [ -z "$TASK_DEF_ARN" ] || [ "$TASK_DEF_ARN" = "None" ]; then
            echo "Could not resolve backup task definition; failing stop workflow before shutdown."
            exit 1
          fi

          SUBNET_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='MinecraftPublicAccess'].OutputValue" \
            --output text)

          SERVICE_ARN=$(aws ecs list-services \
            --cluster "$CLUSTER_NAME" \
            --query "serviceArns[0]" \
            --output text)

          SG_ID=$(aws ecs describe-services \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_ARN" \
            --query "services[0].networkConfiguration.awsvpcConfiguration.securityGroups[0]" \
            --output text)

          if [ -z "$SUBNET_ID" ] || [ "$SUBNET_ID" = "None" ] || [ -z "$SG_ID" ] || [ "$SG_ID" = "None" ]; then
            echo "Missing networking values for backup task. subnet='$SUBNET_ID' sg='$SG_ID'"
            exit 1
          fi

          BACKUP_KEY="world_$(date -u +%Y%m%d%H%M%S).zip"
          echo "BACKUP_KEY=$BACKUP_KEY" >> "$GITHUB_ENV"
          echo "Backup object key: $BACKUP_KEY"

          BACKUP_TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --launch-type FARGATE \
            --task-definition "$TASK_DEF_ARN" \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_ID],securityGroups=[$SG_ID],assignPublicIp=ENABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"minecraft-backup\",\"environment\":[{\"name\":\"BACKUP_KEY\",\"value\":\"$BACKUP_KEY\"}]}]}" \
            --query "tasks[0].taskArn" \
            --output text)

          if [ -z "$BACKUP_TASK_ARN" ] || [ "$BACKUP_TASK_ARN" = "None" ]; then
            echo "Failed to start backup task."
            exit 1
          fi

          echo "Waiting for backup task to complete: $BACKUP_TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER_NAME" \
            --tasks "$BACKUP_TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER_NAME" \
            --tasks "$BACKUP_TASK_ARN" \
            --query "tasks[0].containers[0].exitCode" \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            STOPPED_REASON=$(aws ecs describe-tasks \
              --cluster "$CLUSTER_NAME" \
              --tasks "$BACKUP_TASK_ARN" \
              --query "tasks[0].stoppedReason" \
              --output text)
            CONTAINER_REASON=$(aws ecs describe-tasks \
              --cluster "$CLUSTER_NAME" \
              --tasks "$BACKUP_TASK_ARN" \
              --query "tasks[0].containers[0].reason" \
              --output text)
            LOG_GROUP_NAME=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query "Stacks[0].Parameters[?ParameterKey=='LogGroupName'].ParameterValue" \
              --output text)
            TASK_ID="${BACKUP_TASK_ARN##*/}"

            echo "Backup task failed with exit code $EXIT_CODE"
            echo "Stopped reason: $STOPPED_REASON"
            echo "Container reason: $CONTAINER_REASON"

            if [ -n "$LOG_GROUP_NAME" ] && [ "$LOG_GROUP_NAME" != "None" ]; then
              echo "Recent backup container logs:"
              aws logs get-log-events \
                --log-group-name "$LOG_GROUP_NAME" \
                --log-stream-name "backup/minecraft-backup/$TASK_ID" \
                --query "events[].message" \
                --output text || true
            fi

            exit 1
          fi

      - name: Resolve latest backup object from S3
        if: ${{ github.event.inputs.action == 'stop' && github.event.inputs.include_backup_link == 'yes' }}
        run: |
          set -euo pipefail
          BUCKET_NAME=$(aws cloudformation list-stack-resources \
            --stack-name "$STACK_NAME" \
            --query "StackResourceSummaries[?ResourceType=='AWS::S3::Bucket']|[0].PhysicalResourceId" \
            --output text)

          if [ -z "$BUCKET_NAME" ] || [ "$BUCKET_NAME" = "None" ]; then
            echo "No S3 bucket found in stack resources."
            exit 0
          fi

          LATEST_KEY="${BACKUP_KEY:-}"

          if [ -z "$LATEST_KEY" ]; then
            LATEST_BACKUP_URI=$(aws s3 cp "s3://$BUCKET_NAME/latest-backup.txt" - --only-show-errors || true)
            LATEST_BACKUP_URI=$(printf "%s" "$LATEST_BACKUP_URI" | tr -d '\r\n')

            if [ -n "$LATEST_BACKUP_URI" ] && [ "$LATEST_BACKUP_URI" != "None" ]; then
              LATEST_KEY="${LATEST_BACKUP_URI#s3://$BUCKET_NAME/}"
            fi
          fi

          if [ -z "$LATEST_KEY" ]; then
            echo "Latest backup marker not found. Falling back to newest zip object in '$BUCKET_NAME'."
            LATEST_KEY=$(aws s3api list-objects-v2 \
              --bucket "$BUCKET_NAME" \
              --query "sort_by(Contents[?ends_with(Key, '.zip')], &LastModified)[-1].Key" \
              --output text || true)
          fi

          if [ -z "$LATEST_KEY" ] || [ "$LATEST_KEY" = "None" ]; then
            echo "No backup objects found in bucket '$BUCKET_NAME'."
            exit 0
          fi

          if ! BACKUP_URL=$(aws s3 presign "s3://$BUCKET_NAME/$LATEST_KEY" --expires-in 86400); then
            echo "Failed to generate pre-signed URL for s3://$BUCKET_NAME/$LATEST_KEY."
            exit 0
          fi

          echo "LATEST_BACKUP_BUCKET=$BUCKET_NAME" >> "$GITHUB_ENV"
          echo "LATEST_BACKUP_KEY=$LATEST_KEY" >> "$GITHUB_ENV"
          {
            echo "LATEST_BACKUP_URL<<EOF"
            echo "$BACKUP_URL"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Stop selected stack
        if: ${{ github.event.inputs.action == 'stop' }}
        run: |
          set -euo pipefail
          echo "Stopping stack: $STACK_NAME"
          if ! aws cloudformation update-stack \
            --stack-name "$STACK_NAME" \
            --use-previous-template \
            --parameters \
              ParameterKey=ServerState,ParameterValue=Stopped \
              ParameterKey=SubnetId,UsePreviousValue=true \
              ParameterKey=VpcId,UsePreviousValue=true \
              ParameterKey=ECSClusterName,UsePreviousValue=true \
              ParameterKey=MinecraftImageTag,UsePreviousValue=true \
              ParameterKey=Memory,UsePreviousValue=true \
              ParameterKey=Cpu,UsePreviousValue=true \
              ParameterKey=Seed,UsePreviousValue=true \
              ParameterKey=Whitelist,UsePreviousValue=true \
              ParameterKey=AdminPlayerNames,UsePreviousValue=true \
              ParameterKey=LogGroupName,UsePreviousValue=true \
              ParameterKey=DnsHostname,UsePreviousValue=true \
              ParameterKey=DnsUpdateUrl,UsePreviousValue=true \
            --capabilities CAPABILITY_NAMED_IAM; then
            echo "No updates to apply or stop update failed. Checking status..."
          fi

      - name: Wait for stop to complete
        if: ${{ github.event.inputs.action == 'stop' }}
        run: |
          set -euo pipefail
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" \
            --output text)
          if [ "$STATUS" = "UPDATE_IN_PROGRESS" ] || [ "$STATUS" = "UPDATE_COMPLETE_CLEANUP_IN_PROGRESS" ]; then
            aws cloudformation wait stack-update-complete --stack-name "$STACK_NAME"
          fi

      - name: Notify Discord (stop)
        if: ${{ github.event.inputs.action == 'stop' }}
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord notification."
            exit 0
          fi

          if [ -n "${LATEST_BACKUP_URL:-}" ]; then
            MSG=$(cat <<EOF
          Minecraft stack '${STACK_NAME}' stopped.

          Backup download link (expires in 24 hours):
          ${LATEST_BACKUP_URL}

          S3 object:
          s3://${LATEST_BACKUP_BUCKET}/${LATEST_BACKUP_KEY}
          EOF
          )
          else
            MSG=$(cat <<EOF
          Minecraft stack '${STACK_NAME}' stopped.

          Backup task completed, but no download URL was generated.
          EOF
          )
          fi

          PAYLOAD=$(MSG="$MSG" python3 -c 'import json, os; print(json.dumps({"content": os.environ["MSG"]}))')

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Delete selected stack
        if: ${{ github.event.inputs.action == 'delete' }}
        run: |
          set -euo pipefail
          echo "Deleting stack permanently: $STACK_NAME"
          aws cloudformation delete-stack --stack-name "$STACK_NAME"
          aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME"

      - name: Notify Discord (delete)
        if: ${{ github.event.inputs.action == 'delete' }}
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord notification."
            exit 0
          fi

          MSG="Minecraft stack '${STACK_NAME}' has been deleted permanently."

          PAYLOAD=$(MSG="$MSG" python3 -c 'import json, os; print(json.dumps({"content": os.environ["MSG"]}))')

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
